<?xml version="1.0" encoding="UTF-8"?>
<!--
  Pantheon mark  vector source of truth (scalable, diffable, inline in HTML).
  Default: #1a1a1a on transparent. For white mark: set fill="#ffffff" or use CSS.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Pantheon">
  <title>Pantheon</title>
  <!-- Pediment -->
  <path fill="#1a1a1a" d="M8 22 L32 8 L56 22 L56 26 L8 26 Z"/>
  <!-- Columns (three equal bays) -->
  <rect fill="#1a1a1a" x="14" y="28" width="7" height="28" rx="0"/>
  <rect fill="#1a1a1a" x="28.5" y="28" width="7" height="28" rx="0"/>
  <rect fill="#1a1a1a" x="43" y="28" width="7" height="28" rx="0"/>
  <!-- Stylobate (base line) -->
  <rect fill="#1a1a1a" x="6" y="56" width="52" height="4" rx="0"/>
</svg>
